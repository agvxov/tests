version: '3.9'

services:
  api-gateway:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - hello-world-service
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  hello-world-service:
    image: alpine:latest
    command: ["sh", "-c", "echo 'Hello, World!' > /output/message && tail -f /dev/null"]
    volumes:
      - shared-volume:/output
    depends_on:
      - config-service

  config-service:
    image: busybox:latest
    command: ["sh", "-c", "echo 'config=hello' > /config/app.conf && tail -f /dev/null"]
    volumes:
      - config-volume:/config

  logging-sidecar:
    image: busybox:latest
    command: ["sh", "-c", "tail -f /shared/message"]
    volumes:
      - shared-volume:/shared

  metrics-exporter:
    image: prom/statsd-exporter
    ports:
      - "9102:9102"

  tracing-agent:
    image: jaegertracing/jaeger-agent:latest
    environment:
      - COLLECTOR_HOST=tracing-backend

  tracing-backend:
    image: jaegertracing/jaeger-collector:latest
    ports:
