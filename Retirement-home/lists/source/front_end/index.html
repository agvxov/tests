<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body class="h-full">
    <div class="min-h-full max-w-7xl mx-auto">
      <nav class="bg-orange-600">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 md:px-4 lg:px-8">
          <div class="flex h-16 items-center justify-between">
            <div class="flex items-center">
              <div class="flex-shrink-0">
                <img
                  class="lg:h-10 h-8 lg:w-10 w-8"
                  src="assets/logo.png"
                  alt="Lists"
                />
              </div>
              <div class="hidden md:block">
                <div
                  class="lg:ml-10 md:ml-5 flex items-baseline space-x-4"
                  id="navbar"
                >
                  <!-- Current: "bg-orange-800 text-white", Default: "text-white hover:bg-orange-400 hover:text-white" -->
                  <a
                    href="#"
                    class="bg-orange-800 text-white rounded-md px-3 py-2 lg:text-base md:text-sm font-robcon drop-shadow"
                    aria-current="page"
                    >Home</a
                  >
                  <a
                    href="movies.html"
                    class="text-white hover:bg-orange-400 hover:text-white rounded-md lg:px-3 md:px-2 py-2 lg:text-base md:text-sm font-robcon drop-shadow"
                    >Movies</a
                  >
                  <a
                    href="series.html"
                    class="text-white hover:bg-orange-400 hover:text-white rounded-md lg:px-3 md:px-2 py-2 lg:text-base md:text-sm font-robcon drop-shadow"
                    >TV Shows</a
                  >
                  <a
                    href="news.html"
                    class="text-white hover:bg-orange-400 hover:text-white rounded-md lg:px-3 md:px-2 py-2 lg:text-base md:text-sm font-robcon drop-shadow"
                    >News</a
                  >
                  <a
                    href="about.html"
                    class="text-white hover:bg-orange-400 hover:text-white rounded-md lg:px-3 md:px-2 py-2 lg:text-base md:text-sm font-robcon drop-shadow"
                    >About</a
                  >
                </div>
              </div>
            </div>

            <label
              for="default-search"
              class="mb-2 text-sm font-medium text-gray-900 sr-only dark:text-white"
              >Search</label
            >
            <div class="relative hidden md:block">
              <div
                class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
              >
                <img
                  src="assets/search.png"
                  alt="Search"
                  class="w-5 h-5 text-gray-400 cursor-pointer"
                  aria-hidden="true"
                />
              </div>
              <input
                type="search"
                id="default-search"
                class="block h-10 p-4 pl-10 lg:pr-24 md:pr-4 text-sm text-gray-900 border border-orange-800 rounded-lg bg-white"
                placeholder="Search Movies, TV Shows..."
              />
              <!-- <button type="submit" class="text-white absolute right-2.5 bottom-2.5 bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Search</button> -->
            </div>

            <!-- Right side of navbar, notification + account -->
            <div class="hidden md:block">
              <div class="ml-4 flex items-center md:ml-4">
                <button
                  type="button"
                  class="relative rounded-full bg-orange-800 p-1 text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800"
                >
                  <span class="absolute -inset-1.5"></span>
                  <span class="sr-only">View notifications</span>
                  <svg
                    class="lg:h-6 lg:w-6 md:h-5 md:w-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="white"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                    />
                  </svg>
                </button>

                <!-- Profile dropdown -->
                <div class="relative lg:ml-3 md:ml-2">
                  <div>
                    <button
                      type="button"
                      class="relative flex max-w-xs items-center rounded-full bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800"
                      id="user-menu-button"
                      aria-expanded="false"
                      aria-haspopup="true"
                    >
                      <span class="absolute -inset-1.5"></span>
                      <span class="sr-only">Open user menu</span>
                      <img
                        class="lg:h-8 lg:w-8 md:h-7 md:w-7 rounded-full"
                        src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                        alt=""
                      />
                    </button>
                  </div>

                  <!--
                      Dropdown menu, show/hide based on menu state.
      
                      Entering: "transition ease-out duration-100"
                        From: "transform opacity-0 scale-95"
                        To: "transform opacity-100 scale-100"
                      Leaving: "transition ease-in duration-75"
                        From: "transform opacity-100 scale-100"
                        To: "transform opacity-0 scale-95"
                    -->
                  <div
                    id="profileDropDown"
                    class="hidden absolute right-0 z-10 mt-2 w-48 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none"
                    role="menu"
                    aria-orientation="vertical"
                    aria-labelledby="user-menu-button"
                    tabindex="-1"
                  >
                    <!-- Active: "bg-gray-100", Not Active: "" -->
                    <a
                      href="#"
                      class="block px-4 py-2 text-sm text-gray-700"
                      role="menuitem"
                      tabindex="-1"
                      id="user-menu-item-0"
                      >Your Profile</a
                    >
                    <a
                      href="#"
                      class="block px-4 py-2 text-sm text-gray-700"
                      role="menuitem"
                      tabindex="-1"
                      id="user-menu-item-1"
                      >Settings</a
                    >
                    <a
                      href="#"
                      class="block px-4 py-2 text-sm text-gray-700"
                      role="menuitem"
                      tabindex="-1"
                      id="user-menu-item-2"
                      >Sign out</a
                    >
                  </div>
                </div>
              </div>
            </div>

            <!-- Mobile searchbar -->
            <div class="-mr-2 flex md:hidden">
              <label
                for="default-search"
                class="mb-2 text-sm font-medium text-gray-900 sr-only dark:text-white"
                >Search</label
              >
              <div class="relative">
                <div
                  class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
                >
                  <img
                    src="assets/search.png"
                    alt="Search"
                    class="w-5 h-5 text-gray-400"
                    aria-hidden="true"
                  />
                </div>
                <input
                  type="search"
                  id="default-search"
                  class="w-full h-10 p-4 pr-20 pl-10 text-sm text-gray-900 border border-orange-800 rounded-lg bg-white mx-auto"
                  placeholder="Search Movies, TV Shows..."
                  required
                />
                <!-- <button type="submit" class="text-white absolute right-2.5 bottom-2.5 bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Search</button> -->
              </div>

              <!-- Mobile menu button -->
              <button
                id="mobileMenuBtn"
                type="button"
                class="relative inline-flex items-center justify-center rounded-md bg-orange-600 p-2 text-gray-400 hover:bg-orange-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800"
                aria-controls="mobile-menu"
                aria-expanded="false"
              >
                <span class="absolute -inset-0.5"></span>
                <span class="sr-only">Open main menu</span>
                <!-- Menu open: "hidden", Menu closed: "block" -->
                <svg
                  id="mobileMenuOpen"
                  class="block h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="white"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                  />
                </svg>
                <!-- Menu open: "block", Menu closed: "hidden" -->
                <svg
                  id="mobileMenuClose"
                  class="hidden h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="white"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 18L18 6M6 6l12 12"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Mobile menu, show/hide based on menu state. -->

        <div class="md:hidden hidden" id="mobile-menu">
          <div id="mobile-navbar" class="space-y-1 px-2 pb-3 pt-2 sm:px-3">
            <!-- Current: "bg-orange-800 text-white", Default: "text-white hover:bg-orange-400 hover:text-white" -->
            <a
              href="#"
              class="bg-orange-800 text-white block rounded-md px-3 py-2 text-base font-robcon"
              aria-current="page"
              >Home</a
            >
            <a
              href="movies.html"
              class="text-white hover:bg-orange-400 hover:text-white block rounded-md px-3 py-2 text-base font-robcon"
              >Movies</a
            >
            <a
              href="series.html"
              class="text-white hover:bg-orange-400 hover:text-white block rounded-md px-3 py-2 text-base font-robcon"
              >TV Shows</a
            >
            <a
              href="news.html"
              class="text-white hover:bg-orange-400 hover:text-white block rounded-md px-3 py-2 text-base font-robcon"
              >News</a
            >
            <a
              href="about.html"
              class="text-white hover:bg-orange-400 hover:text-white block rounded-md px-3 py-2 text-base font-robcon"
              >About</a
            >
          </div>

          <!-- Mobile notification + account-->
          <div class="border-t border-gray-700 pb-3 pt-4">
            <div class="flex items-center px-5">
              <div class="flex-shrink-0">
                <img
                  class="h-10 w-10 rounded-full"
                  src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                  alt=""
                />
              </div>
              <div class="ml-3">
                <div class="text-base font-robcon leading-none text-white">
                  Tom Cook
                </div>
                <div class="text-sm font-robcon leading-none text-gray-400">
                  tom@example.com
                </div>
              </div>
              <button
                type="button"
                class="relative ml-auto flex-shrink-0 rounded-full bg-orange-800 p-1 text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800"
              >
                <span class="absolute -inset-1.5"></span>
                <span class="sr-only">View notifications</span>
                <svg
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="white"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                  />
                </svg>
              </button>
            </div>

            <!-- Mobile profile dropdown -->
            <div class="mt-3 space-y-1 px-2">
              <a
                href="#"
                class="block rounded-md px-3 py-2 text-base font-robcon text-white hover:bg-gray-700 hover:text-white"
                >Your Profile</a
              >
              <a
                href="#"
                class="block rounded-md px-3 py-2 text-base font-robcon text-white hover:bg-gray-700 hover:text-white"
                >Settings</a
              >
              <a
                href="#"
                class="block rounded-md px-3 py-2 text-base font-robcon text-white hover:bg-gray-700 hover:text-white"
                >Sign out</a
              >
            </div>
          </div>
        </div>
      </nav>

      <!-- Header -->
      <header class="bg-blue-200 pb-12">
        <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
          <h1
            class="text-3xl font-bold tracking-tight text-white text-center font-robcon drop-shadow-[1px_1px_1px_rgba(0,0,0,0.8)]"
          >
            HOT🌶️🔥
          </h1>
        </div>
        <div id="new-arrivals" class="flex justify-between mx-auto">
          <div
            id="new-movies"
            class="mx-auto w-72 h-96 rounded-xl bg-blue-500 pt-3 shadow-box"
          >
            <h2
              class="text-2xl font-bold tracking-tight text-white text-center font-robcon drop-shadow-lg cursor-default"
            >
              New Movies
            </h2>
          </div>
          <div
            id="new-series"
            class="mx-auto w-72 h-96 rounded-xl bg-blue-500 pt-3 shadow-box hidden lg:block md:block"
          >
            <h2
              class="text-2xl font-bold tracking-tight text-white text-center font-robcon drop-shadow-lg cursor-default"
            >
              New TV Shows
            </h2>
          </div>
          <div
            id="most-watched-movies"
            class="mx-auto w-72 h-96 rounded-xl bg-blue-500 pt-3 hidden lg:block shadow-box"
          >
            <h2
              class="text-2xl font-bold tracking-tight text-white text-center font-robcon drop-shadow-lg cursor-default"
            >
              Most Watched Movies
            </h2>
          </div>
        </div>
      </header>

      <!-- Main content -->
      <main>
        <div class="mx-auto max-w-7xl py-6 sm:px-6 lg:px-8">
          <h1 class="text-3xl font-bold tracking-tight text-gray-900">
            Content
          </h1>
        </div>
      </main>
    </div>

    <script
      src="https://kit.fontawesome.com/563d07cb20.js"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
